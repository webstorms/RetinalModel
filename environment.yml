name: retina
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10 
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=11.8
  - matplotlib
  - seaborn
  - pandas
  - nb_conda_kernels
  - ipywidgets
  - pip
  - pip:
      - h5py
      - jupyter
      - scikit-learn==1.3.2
      - devtorch==0.0.5
      - brainbox==0.0.9
      - -e .